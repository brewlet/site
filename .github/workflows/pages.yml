name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "styles.css"
      - "*.svg"
      - "*.png"
      - "CNAME"
      - "mkdocs.yml"
      - "docs/**"
      - "WORKSHOP.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build docs site
        run: |
          python -m pip install --upgrade pip
          pip install --quiet mkdocs mkdocs-material
          python -m mkdocs build --strict
      - name: Assemble publish directory
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='docs' \
            --exclude='_site' \
            ./ _site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
