site_name: Brewlet docs
site_description: Brewlet user and operator documentation
site_url: https://brewlet.sh/docs/
docs_dir: docs
site_dir: _site/docs
repo_url: https://github.com/brewlet/site
repo_name: brewlet/site
edit_uri: edit/main/docs/
not_in_nav: |
  logos/README.md

theme:
  name: material
  logo: logos/brewlet-logo.svg
  favicon: logos/brewlet-logo.svg
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.action.edit

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

extra_css:
  - stylesheets/brewlet-docs.css

nav:
  - Understand:
      - Home: README.md
      - Concepts & architecture: concepts.md
  - Try it:
      - Getting started: getting-started.md
      - Spring PetClinic: spring-petclinic.md
  - Run on a cluster:
      - Installation: installation.md
      - Configuration: configuration.md
      - JDK management: jdk-management.md
      - Launchers: launchers.md
  - Ship workloads:
      - Building & publishing: building-and-publishing.md
      - Deploying workloads: deploying-workloads.md
      - Resource tuning: resource-tuning.md
  - Operate:
      - Security: security.md
      - Observability: observability.md
      - Troubleshooting: troubleshooting.md
  - Reference:
      - CLI reference: cli-reference.md
      - Core reference: reference.md
      - AppCDS: appcds.md
      - JPMS support: jpms-support.md
      - Layered classpath deployment: layered-classpath-deployment.md
      - Runnable-image delivery: runnable-image.md
  - Roadmap and research:
      - Multi-arch fleets: multi-arch.md
      - Supply-chain admission: supply-chain-admission.md
      - Sandbox runtimes: sandbox-runtimes.md
      - Metrics exporter: metrics-exporter.md
      - Multi-runtime support (.NET): dotnet-runtime-support.md
